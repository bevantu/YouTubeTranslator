<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Bilingual Subtitles</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="popup-logo">
        <img src="../icons/icon48.png" alt="Logo" width="28" height="28">
        <div>
          <h1 class="popup-title">YT Bilingual</h1>
          <span class="popup-version">v1.0.0</span>
        </div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="enableToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </header>

    <div class="popup-body">
      <!-- Status -->
      <div class="popup-status" id="statusSection">
        <div class="status-dot"></div>
        <span class="status-text">Ready</span>
      </div>

      <!-- Language Settings -->
      <div class="popup-section">
        <label class="popup-label">Target Language (Learning)</label>
        <select id="targetLanguage" class="popup-select">
          <option value="en">English</option>
          <option value="zh">中文</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="ru">Русский</option>
          <option value="pt">Português</option>
          <option value="it">Italiano</option>
          <option value="ar">العربية</option>
          <option value="hi">हिन्दी</option>
          <option value="th">ไทย</option>
          <option value="vi">Tiếng Việt</option>
          <option value="tr">Türkçe</option>
        </select>
      </div>

      <div class="popup-section">
        <label class="popup-label">Native Language</label>
        <select id="nativeLanguage" class="popup-select">
          <option value="zh">中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="ru">Русский</option>
          <option value="pt">Português</option>
          <option value="it">Italiano</option>
        </select>
      </div>

      <div class="popup-section">
        <label class="popup-label">Proficiency Level</label>
        <select id="proficiencyLevel" class="popup-select">
          <option value="none">Zero Basics</option>
          <option value="primary">小学 (Primary)</option>
          <option value="middle">初中 (Middle)</option>
          <option value="high">高中 (High)</option>
          <option value="cet4">四级 (CET-4)</option>
          <option value="cet6">六级 (CET-6)</option>
        </select>
      </div>

      <div class="popup-section"
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <label class="popup-label" style="margin-bottom: 0;">Use AI Translation</label>
        <label class="toggle-switch" style="scale: 0.8; transform-origin: right center;">
          <input type="checkbox" id="useAITranslation" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="popup-section"
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <label class="popup-label" style="margin-bottom: 0;">🌐 Webpage Translation</label>
        <label class="toggle-switch" style="scale: 0.8; transform-origin: right center;">
          <input type="checkbox" id="webPageTranslation">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- Quick Actions -->
      <div class="popup-actions">
        <button id="togglePanel" class="popup-btn popup-btn-secondary">
          <span class="btn-icon">📝</span> Toggle Panel
        </button>
        <button id="openSettings" class="popup-btn popup-btn-primary">
          <span class="btn-icon">⚙️</span> Full Settings
        </button>
      </div>

      <!-- Stats -->
      <div class="popup-stats">
        <div class="stat-item">
          <span class="stat-value" id="learningStat">0</span>
          <span class="stat-label">Learning</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="masteredStat">0</span>
          <span class="stat-label">Mastered</span>
        </div>
      </div>
    </div>
  </div>

  <script src="../lib/wordlevels.js"></script>
  <script src="../lib/languages.js"></script>
  <script src="../lib/storage.js"></script>
  <script src="popup.js"></script>
</body>

</html>
